# =============================================================================
# cwe_owasp_map.yaml — CWE -> OWASP Top 10 (2021) category mapping
# =============================================================================
# A curated subset of the official OWASP Top 10:2021 CWE mapping, covering the
# CWEs that actually appear in web/application CVEs. CWEs not listed here map to
# "Unmapped" (e.g. memory-safety classes like CWE-119/125/787 that fall outside
# the web Top 10). The classifier picks the highest-priority matching category
# (A01 highest) across a CVE's CWE list. Source:
#   https://owasp.org/Top10/A00_2021_Introduction/  (category->CWE lists)
# Keep explicit and versioned so the RQ2 class mix is reproducible.
# =============================================================================
