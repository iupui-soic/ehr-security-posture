[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ehr-security-benchmark"
version = "1.0.0"
description = "Reproducible comparative security study of open-source EHR systems (BHI Paper #1)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "EHR Security Study" }]

# Pinned for reproducibility. Exact transitive pins go in requirements.lock
# (generated by scripts/setup_env.sh). Runs in an isolated uv-managed py3.11 venv.
dependencies = [
  "requests==2.32.3",
  "PyYAML==6.0.2",
  "pandas==2.2.3",
  "pyarrow==18.1.0",
  "matplotlib==3.9.4",
  "networkx==3.4.2",
  "jsonschema==4.23.0",
  "tenacity==9.0.0",
  "python-dotenv==1.0.1",
  "tqdm==4.67.1",
]

[project.optional-dependencies]
dev = [
  "pytest==8.3.4",
]

[tool.setuptools]
packages = [
  "src",
  "src.common",
  "src.acquire",
  "src.transform",
  "src.analyze",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
